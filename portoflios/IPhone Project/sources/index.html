<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web IPhone By Safras</title>
    <link rel="stylesheet" href="style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
    <h1 class="title">IPHONE BY <span><a href="safsportfolio.netlify.app/">SAFRAS</a></span><p>Click the power button to start.</p></h1>
    <div class="phone">
        <div class="side-button small-btn"></div>
        <div class="side-button sound-btn2"></div>
        <div class="side-button sound-btn1"></div>
        <div class="side-button power-btn"></div>
        <div class="blank"></div>
        <div class="screen">
            <div class="blur"></div>
            <div class="error">
                <p>Can't open this app now.
                   This phone is in still building process.
                </p>
                   <hr>
                   <h4 class="back-btn">Back</h4>
            </div>
            <div class="dynamic-island">
                <div class="fcamera">
                    <div class="inner-fcamera"></div>
                </div>
            </div>
            <div class="notification-bar">
                <div class="left">
                    <p>5:11</p>
                </div>
                <div class="right">
                    <i class='bx bx-signal-4'></i>
                    <i class='bx bx-wifi'></i>
                    <i class='bx bxs-battery-charging' style='color:#ffffff' ></i>
                </div>
            </div>
            <div class="top-apps">
                <div class="app facetime" style="background-image: url(imgs/apps/170981_time_icon.png);">
                    <p>FaceTime</p>
                </div>
                <div class="app calendar" style="background-image: url(imgs/apps/170992_calendar_icon.png);">
                    <p>Calendar</p>
                </div>
                <div class="app photos" style="background-image: url(imgs/apps/170972_photos_icon.png);">
                    <p>Photos</p>
                </div>
                <div class="app camera" style="background-image: url(imgs/apps/170994_camera_icon.png);">
                    <p>Camera</p>
                </div>
                <div class="app mail" style="background-image: url(imgs/apps/170978_mail_icon.png);">
                    <p>Mail</p>
                </div>
                <div class="app notes" style="background-image: url(imgs/apps/170980_notes_icon.png);">
                    <p>Note</p>
                </div>
                <div class="app reminders" style="background-image: url(imgs/apps/170975_reminders_icon.png);">
                    <p>Reminders</p>
                </div>
                <div class="app clock" style="background-image: url(imgs/apps/170979_clock_icon.png);">
                    <p>Clock</p>
                </div>
                <div class="app news" style="background-image: url(imgs/apps/Apple_News_2019_icon_\(iOS\).svg.png);">
                    <p>News</p>
                </div>
                <div class="app culculator" style="background-image: url(imgs/apps/170995_calculator_icon.png);">
                    <p>Culculator</p>
                </div>
                <div class="app podcasts" style="background-image: url(imgs/apps/apple-podcast-icon-256x256-iqaw0woe.png);">
                    <p>Podcasts</p>
                </div>
                <div class="app appstore" style="background-image: url(imgs/apps/170982_app_store_icon.png);">
                    <p>App Store</p> 
                </div>
                <div class="app maps" style="background-image: url(imgs/apps/170993_maps_icon.png);">
                    <p>Maps</p>
                </div>
                <div class="app health" style="background-image: url(imgs/apps/apple-health.png);">
                    <p>Health</p>
                </div>
                <div class="app wallet" style="background-image: url(imgs/apps/png-transparent-apple-wallet-apple-pay-ios-9-apple-rectangle-payment-logo-thumbnail.png);">
                    <p>Wallet</p>
                </div>
                <div class="app settings" style="background-image: url(imgs/apps/170983_settings_icon.png);">
                    <p>Settings</p>
                </div>
            </div>
            <div class="bottom-dock">
                <div class="app dial" style="background-image: url(imgs/apps/phone-2023-10-05.png);"></div>
                <div class="app browser" style="background-image: url(imgs/apps/2365241.webp);"></div>
                <div class="app message" style="background-image: url(imgs/apps/youtube-2013-09-05.png);"></div>
                <div class="app music" style="background-image: url(imgs/apps/170984_music_icon.png);"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

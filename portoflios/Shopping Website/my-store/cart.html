<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Shopping Cart | VOGUEMAN</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/cart.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.33/dist/lenis.min.js"></script>
</head>
<body>
    <site-header></site-header>

    <main>
        <div class="cart-page-container">
            <div class="container">
                <h1 class="reveal-text"><span>YOUR</span> <span>BAG</span></h1>
                
                <div class="cart-layout-centered" id="cart-content">
                    <div id="cart-list" class="fade-in">
                        <!-- Items Injected Here -->
                    </div>

                    <div class="cart-footer-centered fade-in">
                        <div class="total-summary-box">
                            <div class="total-row">
                                <span class="label">ESTIMATED TOTAL</span>
                                <span id="total" class="amount">$0.00</span>
                            </div>
                            <p class="summary-note">Taxes and shipping calculated at checkout.</p>
                            <div class="cart-actions">
                                <a href="shop.html" class="btn-outline-minimal">CONTINUE SHOPPING</a>
                                <a href="checkout.html" class="btn btn-cart-final">PROCEED TO CHECKOUT</a>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="empty-cart-msg" style="display: none; text-align: center; padding: 100px 0;">
                    <p style="font-size: 1.5rem; color: #888; margin-bottom: 40px;">YOUR BAG IS CURRENTLY EMPTY.</p>
                    <a href="shop.html" class="btn">START EXPLORING</a>
                </div>
            </div>
        </div>
    </main>

    <site-footer></site-footer>

    <script src="assets/js/main.js"></script>
    <script src="assets/js/gsap-animations.js"></script>
    <script src="assets/js/components.js"></script>
    <script src="assets/js/cart.js"></script>
</body>
</html>
